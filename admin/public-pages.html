<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Pages — Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="../styles/tailwind.out.css">
    <link rel="stylesheet" href="../shared/admin.css">
    <style>
        body { background: var(--aap-bg, #f8fafc); font-family: system-ui, -apple-system, sans-serif; margin: 0; }

        .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }

        .filter-tabs { display: flex; gap: 4px; }
        .filter-tab {
            padding: 6px 14px; border-radius: 6px; border: 1px solid var(--aap-border, #e5e7eb);
            background: none; font-family: inherit; font-size: 13px; color: #64748b;
            cursor: pointer; transition: all 0.15s;
        }
        .filter-tab.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .filter-tab:hover:not(.active) { border-color: #94a3b8; }

        .btn-primary {
            display: flex; align-items: center; gap: 6px;
            background: #2563eb; color: #fff; border: none; border-radius: 8px;
            padding: 8px 16px; font-family: inherit; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: background 0.15s; text-decoration: none;
        }
        .btn-primary:hover { background: #1d4ed8; }

        .pages-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; }
        .pages-table th {
            text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase; color: #94a3b8;
            background: #f8fafc; border-bottom: 1px solid #e5e7eb;
        }
        .pages-table td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .pages-table tr:last-child td { border-bottom: none; }
        .pages-table tr:hover td { background: #f8fafc; }

        .page-title { font-weight: 600; font-size: 14px; color: #0f172a; }
        .page-path { font-size: 12px; color: #94a3b8; margin-top: 2px; font-family: monospace; }
        .page-desc { font-size: 13px; color: #64748b; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600;
        }
        .status-active { background: #dcfce7; color: #16a34a; }
        .status-archived { background: #f1f5f9; color: #64748b; }

        .action-btn {
            padding: 5px 12px; border-radius: 6px; border: 1px solid #e5e7eb;
            background: #fff; font-family: inherit; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .action-btn:hover { background: #f8fafc; border-color: #94a3b8; }
        .action-btn.danger:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
        .action-btn.success:hover { background: #f0fdf4; color: #16a34a; border-color: #86efac; }

        .actions { display: flex; gap: 6px; justify-content: flex-end; }

        /* Add modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 12px; padding: 28px 32px;
            width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal h2 { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
        .form-input {
            width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;
            font-family: inherit; font-size: 14px; box-sizing: border-box;
            transition: border-color 0.15s;
        }
        .form-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-row { display: grid; grid-template-columns: 80px 1fr; gap: 10px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
        .btn-cancel {
            padding: 8px 16px; border-radius: 8px; border: 1px solid #e5e7eb;
            background: #fff; font-family: inherit; font-size: 13px; cursor: pointer;
        }
        .btn-cancel:hover { background: #f8fafc; }

        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 999;
            background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px;
            font-size: 13px; transform: translateY(80px); opacity: 0;
            transition: all 0.25s; pointer-events: none;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.success { background: #15803d; }
        #toast.error { background: #dc2626; }

        .skeleton-row td { padding: 14px 16px; }
        .skel { height: 14px; border-radius: 4px; background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body>
    <nav style="background:#fff; border-bottom:1px solid #e5e7eb; padding:0 24px; height:56px; display:flex; align-items:center;">
        <div class="site-nav__inner" style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:900px; margin:0 auto;">
            <div style="display:flex; align-items:center; gap:12px;">
                <a href="index.html" style="color:#64748b; text-decoration:none; font-size:13px;">← Admin</a>
                <span style="color:#e5e7eb;">/</span>
                <span style="font-weight:600; font-size:15px; color:#0f172a;">Public Pages</span>
            </div>
        </div>
    </nav>

    <main style="max-width:900px; margin:40px auto; padding:0 24px;" id="main-content" style="display:none;">
        <div class="toolbar">
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('active', this)">Active</button>
                <button class="filter-tab" onclick="setFilter('archived', this)">Archived</button>
                <button class="filter-tab" onclick="setFilter('all', this)">All</button>
            </div>
            <button class="btn-primary" onclick="openModal()">
                <span>+</span> Add Page
            </button>
        </div>

        <table class="pages-table" id="pages-table">
            <thead>
                <tr>
                    <th>Page</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
            </thead>
            <tbody id="pages-tbody">
                <tr class="skeleton-row">
                    <td><div class="skel" style="width:60%"></div></td>
                    <td><div class="skel" style="width:80%"></div></td>
                    <td><div class="skel" style="width:60px"></div></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </main>

    <!-- Add Page Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Add Public Page</h2>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Icon</label>
                    <input class="form-input" id="f-icon" type="text" value="📄" maxlength="4">
                </div>
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input class="form-input" id="f-title" type="text" placeholder="Page title">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Path <span style="color:#94a3b8;font-weight:400;">(relative to site root)</span></label>
                <input class="form-input" id="f-path" type="text" placeholder="public/my-page.html">
            </div>
            <div class="form-group">
                <label class="form-label">Description <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
                <input class="form-input" id="f-desc" type="text" placeholder="Short description">
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="addPage()">Add Page</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../shared/supabase.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        let allPages = [];
        let currentFilter = 'active';

        requireAuth(async function() {
            document.getElementById('main-content').style.display = 'block';
            await fetchPages();
        });

        async function fetchPages() {
            const { data, error } = await adminSupabase
                .from('public_pages')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { toast('Failed to load pages', 'error'); return; }
            allPages = data || [];
            renderTable();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('pages-tbody');
            let pages = allPages;
            if (currentFilter === 'active') pages = allPages.filter(p => !p.is_archived);
            if (currentFilter === 'archived') pages = allPages.filter(p => p.is_archived);

            if (pages.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">No pages found.</div></td></tr>`;
                return;
            }

            tbody.innerHTML = pages.map(p => `
                <tr>
                    <td>
                        <div class="page-title">${p.icon || '📄'} ${p.title}</div>
                        <div class="page-path">${p.path}</div>
                    </td>
                    <td class="page-desc">${p.description || '—'}</td>
                    <td>
                        <span class="status-badge ${p.is_archived ? 'status-archived' : 'status-active'}">
                            ${p.is_archived ? '● Archived' : '● Active'}
                        </span>
                    </td>
                    <td>
                        <div class="actions">
                            <a href="/${p.path}" target="_blank" class="action-btn">View ↗</a>
                            ${p.is_archived
                                ? `<button class="action-btn success" onclick="setArchived('${p.id}', false)">Restore</button>`
                                : `<button class="action-btn" onclick="setArchived('${p.id}', true)">Archive</button>`
                            }
                            <button class="action-btn danger" onclick="deletePage('${p.id}', '${p.title.replace(/'/g, "\\'")}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function setArchived(id, archived) {
            const { error } = await adminSupabase
                .from('public_pages')
                .update({ is_archived: archived, updated_at: new Date().toISOString() })
                .eq('id', id);

            if (error) { toast('Update failed', 'error'); return; }
            const page = allPages.find(p => p.id === id);
            if (page) page.is_archived = archived;
            renderTable();
            toast(archived ? 'Page archived' : 'Page restored', 'success');
        }

        async function deletePage(id, title) {
            if (!confirm(`Permanently remove "${title}" from the registry?\n\nThe HTML file on disk is not deleted — only the navigation entry is removed.`)) return;

            const { error } = await adminSupabase
                .from('public_pages')
                .delete()
                .eq('id', id);

            if (error) { toast('Delete failed', 'error'); return; }
            allPages = allPages.filter(p => p.id !== id);
            renderTable();
            toast('Page removed', 'success');
        }

        async function addPage() {
            const title = document.getElementById('f-title').value.trim();
            const path = document.getElementById('f-path').value.trim();
            const icon = document.getElementById('f-icon').value.trim() || '📄';
            const description = document.getElementById('f-desc').value.trim() || null;

            if (!title || !path) { toast('Title and path are required', 'error'); return; }

            const { data, error } = await adminSupabase
                .from('public_pages')
                .insert({ title, path, icon, description })
                .select()
                .single();

            if (error) { toast('Failed to add page', 'error'); return; }
            allPages.unshift(data);
            currentFilter = 'active';
            document.querySelectorAll('.filter-tab').forEach((b, i) => b.classList.toggle('active', i === 0));
            renderTable();
            closeModal();
            toast('Page added', 'success');
        }

        function openModal() {
            document.getElementById('f-title').value = '';
            document.getElementById('f-path').value = '';
            document.getElementById('f-icon').value = '📄';
            document.getElementById('f-desc').value = '';
            document.getElementById('modal').classList.add('open');
            setTimeout(() => document.getElementById('f-title').focus(), 50);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Toast helper
        let toastTimer;
        function toast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show' + (type ? ' ' + type : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = ''; }, 2800);
        }
    </script>
    <script>
        /* Shell embed: hide nav when loaded inside the main shell iframe */
        if (window.self !== window.top) {
            var _nav = document.querySelector('nav');
            if (_nav) _nav.style.display = 'none';
        }
    </script>
</body>
</html>
