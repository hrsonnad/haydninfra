<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFC Fight Cards</title>
  <meta name="description" content="Upcoming UFC fight cards with Kalshi market odds, fighter profiles, and AI-powered analysis.">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font:       'Outfit', system-ui, -apple-system, sans-serif;
      --text:       #1a1a1a;
      --text-2:     #6b6b6b;
      --text-3:     #ababab;
      --bg:         #ffffff;
      --surface2:   #fafafa;
      --surface3:   #f5f5f5;
      --line:       #f0f0f0;
      --hover:      rgba(0,0,0,0.04);
      --active:     rgba(0,0,0,0.07);
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:  0 4px 12px rgba(0,0,0,0.07);
      --radius:     10px;
      --radius-sm:  6px;
      /* Semantic — keep for meaning */
      --red:        #dc2626;
      --red-dim:    rgba(220,38,38,0.06);
      --green:      #16a34a;
      --green-dim:  rgba(22,163,74,0.07);
      --gold:       #9a7b1a;
      --gold-dim:   rgba(154,123,26,0.07);
    }

    html.dark {
      --text:       #e8e8e8;
      --text-2:     #999999;
      --text-3:     #555555;
      --bg:         #111111;
      --surface2:   #161616;
      --surface3:   #1c1c1c;
      --line:       #242424;
      --hover:      rgba(255,255,255,0.05);
      --active:     rgba(255,255,255,0.09);
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.4);
      --shadow-md:  0 4px 12px rgba(0,0,0,0.5);
      --red-dim:    rgba(220,38,38,0.12);
      --green-dim:  rgba(22,163,74,0.1);
      --gold-dim:   rgba(154,123,26,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ─────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      height: 49px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .header-logo {
      font-size: 14px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      letter-spacing: -0.02em;
    }
    .logo-badge {
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 6px; border-radius: 4px;
    }
    .live-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 400; color: var(--text-3);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ─── Layout ─────────────────────────────────────────── */
    .page-main {
      max-width: 960px; margin: 0 auto;
      padding: 24px 24px 80px;
    }

    /* ─── Event chips ────────────────────────────────────── */
    .events-wrap { margin-bottom: 20px; }
    .events-scroll {
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
      padding-bottom: 2px;
    }
    .events-scroll::-webkit-scrollbar { display: none; }
    .event-chip {
      flex-shrink: 0;
      padding: 7px 14px; border-radius: 100px;
      border: 1px solid var(--line);
      background: var(--bg);
      font-size: 13px; font-weight: 500;
      color: var(--text-2);
      cursor: pointer; transition: all 0.15s;
      text-align: left; white-space: nowrap;
      font-family: var(--font);
    }
    .event-chip:hover { border-color: var(--text-3); color: var(--text); }
    .event-chip.active {
      background: var(--text); border-color: var(--text);
      color: #fff;
    }
    .event-chip-sub {
      display: block; font-size: 11px; font-weight: 400;
      opacity: 0.65; margin-top: 1px;
    }
    .skel-chip {
      flex-shrink: 0; width: 120px; height: 36px;
      background: var(--surface2); border: 1px solid var(--line);
      border-radius: 100px;
    }

    /* ─── Event banner ───────────────────────────────────── */
    .event-banner {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .event-banner-left { display: flex; flex-direction: column; gap: 4px; }
    .event-title {
      font-size: 18px; font-weight: 600; color: var(--text);
      letter-spacing: -0.02em;
    }
    .event-subtitle { font-size: 13px; color: var(--text-2); }
    .event-details {
      display: flex; flex-wrap: wrap; gap: 14px;
      align-items: center;
    }
    .event-detail {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-3);
    }
    .event-detail svg { width: 14px; height: 14px; flex-shrink: 0; }
    .event-detail strong { font-weight: 500; color: var(--text-2); }

    /* ─── Section divider ────────────────────────────────── */
    .sec-div {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 12px;
    }
    .sec-div:first-of-type { margin-top: 0; }
    .sec-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3); white-space: nowrap;
    }
    .sec-line { flex: 1; height: 1px; background: var(--line); }

    /* ─── Fight card ─────────────────────────────────────── */
    .fight-card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      opacity: 0; transform: translateY(8px);
      animation: slideUp 0.32s ease forwards;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    @keyframes slideUp { to { opacity:1; transform:translateY(0); } }
    .fight-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--text-3);
    }
    .fight-card.is-title {
      border-color: rgba(154,123,26,0.4);
    }
    .fight-card.is-title:hover {
      box-shadow: 0 4px 16px rgba(154,123,26,0.1);
    }

    .title-banner {
      padding: 7px 16px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
      border-bottom: 1px solid rgba(154,123,26,.15);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--gold);
      display: flex; align-items: center; gap: 6px;
    }

    .fight-body { padding: 16px 18px 0; }

    .fight-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .weight-pill {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3);
      background: var(--surface2); padding: 3px 10px;
      border-radius: 100px; border: 1px solid var(--line);
    }
    .rounds-pill {
      font-size: 10px; font-weight: 600;
      color: var(--text-3);
      background: var(--surface2); padding: 3px 8px;
      border-radius: 100px; border: 1px solid var(--line);
    }
    .fight-time {
      margin-left: auto;
      font-size: 11px; font-weight: 400; color: var(--text-3);
    }

    /* ─── Fighters ───────────────────────────────────────── */
    .fighters-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .fighter { display: flex; align-items: center; gap: 12px; }
    .fighter.r { flex-direction: row-reverse; text-align: right; }

    .f-headshot {
      width: 56px; height: 56px; border-radius: 50%;
      object-fit: cover; background: var(--surface2);
      border: 2px solid var(--line);
      flex-shrink: 0;
    }
    .f-headshot.placeholder {
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 600; color: var(--text-3);
    }

    .f-info { display: flex; flex-direction: column; min-width: 0; }

    .fighter-badges {
      display: flex; align-items: center; gap: 5px; margin-bottom: 2px;
    }
    .fighter.r .fighter-badges { flex-direction: row-reverse; }

    .f-flag { font-size: 13px; line-height: 1; }
    .f-rank {
      font-size: 9px; font-weight: 700;
      color: var(--red); letter-spacing: 0.02em;
      background: var(--red-dim);
      padding: 1px 5px; border-radius: 3px;
    }
    .f-rank.champ { color: var(--gold); background: var(--gold-dim); }
    .f-name {
      font-size: clamp(14px, 2.5vw, 17px);
      font-weight: 600; color: var(--text);
      line-height: 1.15; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .f-nick {
      font-style: italic; font-size: 11px;
      color: var(--text-3);
    }
    .f-rec { font-size: 12px; font-weight: 500; color: var(--text-2); }

    .vs-col {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 4px;
    }
    .vs-text {
      font-size: 10px; font-weight: 600;
      color: var(--text-3); letter-spacing: 0.06em;
    }

    /* ─── Fighter stats row ──────────────────────────────── */
    .fighter-stats-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 14px;
    }
    .fighter-stats {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .fighter-stats.r { justify-content: flex-end; }
    .f-stat {
      font-size: 10px; font-weight: 500; color: var(--text-3);
      background: var(--surface2); padding: 2px 8px;
      border-radius: 100px; border: 1px solid var(--line);
      white-space: nowrap;
    }
    .f-stat strong { font-weight: 600; color: var(--text-2); }

    /* ─── Odds / Probability ─────────────────────────────── */
    .odds-section { margin-bottom: 0; }
    .prob-bar-wrap {
      display: flex; flex-direction: column; gap: 6px;
    }
    .prob-labels {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .prob-fighter {
      display: flex; align-items: center; gap: 6px;
    }
    .prob-name {
      font-size: 11px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .prob-pct {
      font-size: 18px; font-weight: 600; color: var(--text);
      letter-spacing: -0.02em; line-height: 1;
    }
    .prob-pct.fav { color: var(--green); }
    .prob-bar-track {
      height: 7px; border-radius: 100px;
      background: var(--surface2);
      overflow: hidden; display: flex;
      border: 1px solid var(--line);
    }
    .prob-bar-fill {
      height: 100%; border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .prob-bar-fill.f1 {
      background: linear-gradient(90deg, var(--green), #22c55e);
    }
    .prob-bar-fill.f2 {
      background: var(--surface3);
    }
    .prob-source {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 4px; margin-top: 2px;
      font-size: 10px; font-weight: 400; color: var(--text-3);
      letter-spacing: 0.03em;
    }
    .prob-source-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green);
    }

    /* Unavailable odds */
    .odds-unavailable {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 10px;
      background: var(--surface2); border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      font-size: 12px; font-weight: 400; color: var(--text-3);
    }

    /* ─── Fight footer ───────────────────────────────────── */
    .fight-footer {
      padding: 12px 18px 14px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 14px;
      border-top: 1px solid var(--line); margin-top: 14px;
    }
    .fight-preview {
      font-size: 13px; line-height: 1.55;
      color: var(--text-2); flex: 1;
    }
    .analyze-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: var(--bg);
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500;
      color: var(--text-2); cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
      font-family: var(--font);
    }
    .analyze-btn:hover {
      border-color: var(--text-3); color: var(--text);
      background: var(--hover);
    }
    .analyze-btn.open {
      background: var(--active); border-color: var(--text-3); color: var(--text);
    }
    .analyze-chevron { transition: transform 0.22s ease; display: inline-block; }
    .analyze-btn.open .analyze-chevron { transform: rotate(180deg); }

    /* ─── Deep dive ──────────────────────────────────────── */
    .deep-dive {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
    }
    .deep-dive.open { max-height: 6000px; opacity: 1; }
    .dive-inner {
      border-top: 1px solid var(--line);
      background: var(--surface2); padding: 20px 18px;
    }

    .analyzing {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px; padding: 40px 20px;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid var(--line); border-top-color: var(--text-2);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .analyzing-lbl {
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3);
    }

    .dive-hdr {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3);
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; margin-top: 18px;
    }
    .dive-hdr:first-child { margin-top: 0; }
    .dive-hdr::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    /* Profiles */
    .profiles-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 540px) { .profiles-grid { grid-template-columns: 1fr; } }

    .profile-card {
      background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .profile-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
    }
    .profile-name-wrap { display: flex; flex-direction: column; }
    .profile-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      letter-spacing: -0.01em;
    }
    .profile-style {
      font-size: 11px; font-style: italic; color: var(--text-3); margin-top: 2px;
    }
    .profile-physicals {
      text-align: right; font-size: 11px; color: var(--text-3); line-height: 1.5;
    }
    .profile-physicals strong { color: var(--text-2); font-weight: 500; }

    .profile-body { padding: 12px 14px; }

    /* Stats grid */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 6px; margin-bottom: 12px;
    }
    .stat-box {
      text-align: center; padding: 8px 4px;
      background: var(--surface2); border-radius: 4px;
      border: 1px solid var(--line);
    }
    .stat-val {
      font-size: 14px; font-weight: 600; color: var(--text);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3); margin-top: 3px;
    }

    .mini-hdr {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 5px; margin-top: 10px;
    }
    .mini-hdr:first-child { margin-top: 0; }

    .trait-list { list-style: none; margin-bottom: 8px; }
    .trait-list li {
      font-size: 12px; color: var(--text-2);
      padding: 2px 0; display: flex;
      align-items: flex-start; gap: 7px; line-height: 1.45;
    }
    .trait-list li::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .trait-list.str li::before { background: var(--green); }
    .trait-list.wk li::before { background: var(--red); }

    .results-list { display: flex; flex-direction: column; gap: 3px; }
    .result-row {
      display: flex; align-items: center; gap: 6px; font-size: 11px;
      padding: 3px 0;
    }
    .res-badge {
      font-size: 9px; font-weight: 700;
      width: 18px; height: 18px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .res-badge.W { background: rgba(22,163,74,.1); color: var(--green); }
    .res-badge.L { background: rgba(220,38,38,.08); color: var(--red); }
    .res-badge.NC { background: rgba(255,180,0,.1); color: #b88a00; }
    .res-opp { color: var(--text); font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .res-method { color: var(--text-2); flex-shrink: 0; }
    .res-date { color: var(--text-3); white-space: nowrap; flex-shrink: 0; }

    .news-items { list-style: none; }
    .news-items li {
      font-size: 12px; color: var(--text-2); line-height: 1.5;
      padding: 4px 0; border-bottom: 1px solid var(--line);
      display: flex; align-items: flex-start; gap: 7px;
    }
    .news-items li:last-child { border-bottom: none; }
    .news-items li::before {
      content: ''; width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-3); margin-top: 6px; flex-shrink: 0;
    }

    .streak-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 100px;
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(22,163,74,.15);
      margin-top: 6px;
    }

    /* H2H */
    .h2h-box {
      background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 12px 14px;
      font-size: 13px; color: var(--text-2);
    }

    /* Factors */
    .factors { display: flex; flex-direction: column; gap: 6px; }
    .factor {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
    }
    .factor-num {
      font-size: 13px; font-weight: 600;
      color: var(--text-2); line-height: 1; flex-shrink: 0;
    }
    .factor-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    /* Prediction */
    .pred-box {
      background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 16px;
    }
    .pred-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .pred-winner {
      font-size: 16px; font-weight: 600; color: var(--text);
    }
    .pred-method { font-size: 13px; font-weight: 400; color: var(--text-2); }
    .conf-badge {
      margin-left: auto; padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 600;
    }
    .conf-badge.high { background: rgba(22,163,74,.08); color: var(--green); border: 1px solid rgba(22,163,74,.18); }
    .conf-badge.medium { background: rgba(255,180,0,.08); color: #b88a00; border: 1px solid rgba(255,180,0,.18); }
    .conf-badge.low { background: rgba(220,38,38,.06); color: var(--red); border: 1px solid rgba(220,38,38,.12); }
    .pred-reasoning { font-size: 13px; color: var(--text-2); line-height: 1.6; }

    /* Why watch */
    .why-box {
      background: var(--surface2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .why-box p { font-size: 13px; color: var(--text-2); line-height: 1.6; }

    /* ─── Skeleton ───────────────────────────────────────── */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--line) 25%, #e8e8e8 50%, var(--line) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    .skel-card {
      background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 18px; margin-bottom: 10px;
    }
    .skel-h { height: 12px; margin-bottom: 8px; }

    .state-box { text-align: center; padding: 64px 20px; }
    .state-ico { font-size: 36px; margin-bottom: 14px; opacity: .4; }
    .state-title { font-size: 14px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .state-sub { font-size: 13px; color: var(--text-3); }

    /* ─── Responsive ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-inner { height: 44px; padding: 0 14px; }
      .fight-footer { flex-direction: column; gap: 10px; }
      .analyze-btn { width: 100%; justify-content: center; }
      .fighters-row { grid-template-columns: 1fr 28px 1fr; gap: 6px; }
      .f-headshot { width: 44px; height: 44px; }
      .fighter { gap: 8px; }
      .f-name { font-size: 14px; }
      .f-nick { font-size: 10px; }
      .page-main { padding: 16px 14px 80px; }
      .event-banner { flex-direction: column; align-items: flex-start; padding: 14px 16px; }
      .event-title { font-size: 16px; }
      .event-details { gap: 8px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .prob-pct { font-size: 16px; }
      .prob-name { font-size: 10px; }
      .fighter-stats-row { gap: 4px; }
      .f-stat { font-size: 9px; padding: 2px 6px; }
      .fight-body { padding: 12px 14px 0; }
      .fight-footer { padding: 10px 14px 12px; }
      .dive-inner { padding: 16px 14px; }
      .profile-header { flex-direction: column; align-items: flex-start; gap: 4px; }
      .profile-physicals { text-align: left; }
      .pred-header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .conf-badge { margin-left: 0; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <span class="logo-badge">UFC</span> Fight Cards
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="live-pill">
        <div class="live-dot"></div>
        <span>Kalshi Odds</span>
      </div>
      <button onclick="toggleTheme()" aria-label="Toggle dark mode" style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:none;border:1px solid var(--line);cursor:pointer;color:var(--text-2);transition:background 120ms,color 120ms,border-color 120ms;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='none'">
        <svg class="theme-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="page-main">
  <div class="events-wrap" id="events-wrap">
    <div class="events-scroll">
      <div class="skel skel-chip"></div>
      <div class="skel skel-chip" style="width:140px"></div>
      <div class="skel skel-chip" style="width:130px"></div>
    </div>
  </div>
  <div id="event-banner"></div>
  <div id="card-container"></div>
</main>

<script>
  const API = 'https://ixxnhvqyxkuwyshzdnlc.supabase.co/functions/v1/ufc-cards';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4eG5odnF5eGt1d3lzaHpkbmxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTk2MTMsImV4cCI6MjA4ODMzNTYxM30.DB2xXD4EPOKA2WzfrTnJ7YMZRU8yCXcU5y6f-tT3V-g';
  const HEADERS = { 'Authorization': `Bearer ${ANON}` };
  const ESPN_IMG = 'https://a.espncdn.com/combiner/i?img=/i/headshots/mma/players/full/';
  const diveCache = new Map();
  let selectedId = null;

  /* ── Init ────────────────────────────────────────────── */
  async function init() {
    try {
      const res = await fetch(`${API}?mode=events`, { headers: HEADERS });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.events?.length) throw new Error('No upcoming events found');
      renderChips(data.events);
      await loadCard(data.events[0]);
    } catch (err) {
      document.getElementById('events-wrap').innerHTML = '';
      showError(err.message);
    }
  }

  /* ── Event chips ─────────────────────────────────────── */
  function renderChips(events) {
    const scroll = document.createElement('div');
    scroll.className = 'events-scroll';
    events.forEach(ev => {
      const btn = document.createElement('button');
      btn.className = 'event-chip';
      btn.dataset.id = ev.id;
      btn.innerHTML = `<span>${ev.shortName || ev.title}</span><span class="event-chip-sub">${fmtDate(ev.date)}</span>`;
      btn.addEventListener('click', () => {
        if (selectedId === ev.id) return;
        loadCard(ev);
      });
      scroll.appendChild(btn);
    });
    document.getElementById('events-wrap').innerHTML = '';
    document.getElementById('events-wrap').appendChild(scroll);
  }

  function activateChip(id) {
    document.querySelectorAll('.event-chip').forEach(c =>
      c.classList.toggle('active', c.dataset.id === id));
    selectedId = id;
  }

  /* ── Event banner ────────────────────────────────────── */
  function renderBanner(event) {
    const el = document.getElementById('event-banner');
    const svg = {
      calendar: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M5 1v3M11 1v3M2 7h12"/></svg>',
      pin: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 14s-5-4.5-5-8a5 5 0 1110 0c0 3.5-5 8-5 8z"/><circle cx="8" cy="6" r="1.5"/></svg>',
      tv: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="3" width="13" height="9" rx="1.5"/><path d="M5 14h6"/></svg>',
    };

    const dateStr = event.startTime
      ? new Date(event.startTime).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })
      : fmtDateLong(event.date);

    el.innerHTML = `
      <div class="event-banner">
        <div class="event-banner-left">
          <div class="event-title">${esc(event.title)}</div>
          ${event.subtitle ? `<div class="event-subtitle">${esc(event.subtitle)}</div>` : ''}
        </div>
        <div class="event-details">
          <div class="event-detail">${svg.calendar} <strong>${esc(dateStr)}</strong></div>
          ${event.venue ? `<div class="event-detail">${svg.pin} ${esc(event.venue)}${event.location ? ', ' + esc(event.location) : ''}</div>` : ''}
          ${event.broadcast ? `<div class="event-detail">${svg.tv} ${esc(event.broadcast)}</div>` : ''}
        </div>
      </div>`;
  }

  /* ── Load fight card ─────────────────────────────────── */
  async function loadCard(event) {
    activateChip(event.id);
    document.getElementById('event-banner').innerHTML = '';
    showSkeleton();
    try {
      const res = await fetch(`${API}?mode=card&event=${encodeURIComponent(event.title)}`, { headers: HEADERS });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.fights?.length) throw new Error('No fights found for this event');
      renderBanner(data.event || event);
      renderCard(data);
    } catch (err) {
      showError('Could not load card: ' + err.message);
    }
  }

  function showSkeleton() {
    document.getElementById('card-container').innerHTML = [0,0.06,0.12,0.18].map(d => `
      <div class="skel-card">
        <div class="skel skel-h" style="width:26%;margin-bottom:14px;animation-delay:${d}s"></div>
        <div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:8px;margin-bottom:12px;">
          <div style="display:flex;gap:10px;align-items:center;">
            <div class="skel" style="width:56px;height:56px;border-radius:50%;flex-shrink:0;animation-delay:${d}s"></div>
            <div style="flex:1">
              <div class="skel skel-h" style="width:70%;height:16px;animation-delay:${d}s"></div>
              <div class="skel skel-h" style="width:40%;animation-delay:${d+0.04}s"></div>
            </div>
          </div>
          <div class="skel" style="height:16px;align-self:center;animation-delay:${d}s"></div>
          <div style="display:flex;gap:10px;align-items:center;flex-direction:row-reverse;">
            <div class="skel" style="width:56px;height:56px;border-radius:50%;flex-shrink:0;animation-delay:${d}s"></div>
            <div style="flex:1">
              <div class="skel skel-h" style="width:70%;height:16px;margin-left:auto;animation-delay:${d}s"></div>
              <div class="skel skel-h" style="width:40%;margin-left:auto;animation-delay:${d+0.04}s"></div>
            </div>
          </div>
        </div>
        <div class="skel" style="height:8px;border-radius:100px;margin-bottom:6px;animation-delay:${d+0.08}s"></div>
      </div>
    `).join('');
  }

  function showError(msg) {
    document.getElementById('card-container').innerHTML = `
      <div class="state-box">
        <div class="state-ico">🥊</div>
        <div class="state-title">Unavailable</div>
        <div class="state-sub">${esc(msg)}</div>
      </div>`;
  }

  /* ── Render card ─────────────────────────────────────── */
  const SECTIONS = ['main_event','co_main','main_card','prelim','early_prelim'];
  const SECTION_LABELS = {
    main_event: 'Main Event', co_main: 'Co-Main Event',
    main_card: 'Main Card', prelim: 'Prelims', early_prelim: 'Early Prelims'
  };

  function renderCard(data) {
    const groups = {};
    SECTIONS.forEach(s => groups[s] = []);
    data.fights.forEach(f => {
      const s = f.card_section || 'main_card';
      (groups[s] || groups.main_card).push(f);
    });

    let html = ''; let delay = 0;
    SECTIONS.forEach(sec => {
      const fights = groups[sec];
      if (!fights.length) return;
      html += `<div class="sec-div">
        <span class="sec-line"></span>
        <span class="sec-label">${SECTION_LABELS[sec]}</span>
        <span class="sec-line"></span>
      </div>`;
      fights.forEach(f => { html += renderFight(f, delay); delay += 0.05; });
    });
    document.getElementById('card-container').innerHTML = html;
  }

  function headshotUrl(athleteId) {
    if (!athleteId) return '';
    return `${ESPN_IMG}${athleteId}.png&w=120&h=120`;
  }

  function renderFight(f, delay) {
    const f1 = f.fighter1 || {}, f2 = f.fighter2 || {};
    const odds = f.odds;
    const hasOdds = odds && odds.f1Prob != null && odds.f2Prob != null;

    const rankBadge = (r) => {
      if (!r) return '';
      const isC = r === 'C' || r.toLowerCase() === 'c';
      return `<span class="f-rank${isC ? ' champ' : ''}">${isC ? 'C' : r}</span>`;
    };

    const titleBanner = f.is_title_fight
      ? `<div class="title-banner">🏆 ${esc(f.title_description || 'Title Fight')}</div>` : '';

    const fightTime = f.short_detail || (f.start_time ? fmtTime(f.start_time) : '');
    const rounds = f.rounds || 3;

    const f1Img = headshotUrl(f1.athleteId);
    const f2Img = headshotUrl(f2.athleteId);
    const f1Initial = (f1.name || '?')[0];
    const f2Initial = (f2.name || '?')[0];

    // Fighter stats pills
    const buildStatPills = (fighter) => {
      const pills = [];
      if (fighter.age) pills.push(`Age <strong>${fighter.age}</strong>`);
      if (fighter.height) pills.push(`Ht <strong>${esc(fighter.height)}</strong>`);
      if (fighter.reach) pills.push(`Rc <strong>${esc(fighter.reach)}</strong>`);
      if (fighter.stance) pills.push(`<strong>${esc(fighter.stance)}</strong>`);
      if (fighter.finish_rate) pills.push(`Finish <strong>${esc(fighter.finish_rate)}</strong>`);
      return pills.map(p => `<span class="f-stat">${p}</span>`).join('');
    };

    // Odds section
    let oddsHtml;
    if (hasOdds) {
      const f1Prob = odds.f1Prob;
      const f2Prob = odds.f2Prob;
      const f1Fav = f1Prob > f2Prob;
      oddsHtml = `
        <div class="prob-bar-wrap">
          <div class="prob-labels">
            <div class="prob-fighter">
              <span class="prob-pct${f1Fav ? ' fav' : ''}">${f1Prob}%</span>
              <span class="prob-name">${lastName(f1.name)}</span>
            </div>
            <div class="prob-fighter">
              <span class="prob-name">${lastName(f2.name)}</span>
              <span class="prob-pct${!f1Fav ? ' fav' : ''}">${f2Prob}%</span>
            </div>
          </div>
          <div class="prob-bar-track">
            <div class="prob-bar-fill f1" style="width:${f1Prob}%"></div>
            <div class="prob-bar-fill f2" style="width:${f2Prob}%"></div>
          </div>
          <div class="prob-source"><span class="prob-source-dot"></span> Kalshi market data</div>
        </div>`;
    } else {
      oddsHtml = `<div class="odds-unavailable">Market odds not available</div>`;
    }

    const f1Stats = buildStatPills(f1);
    const f2Stats = buildStatPills(f2);
    const hasStats = f1Stats || f2Stats;

    return `
      <div class="fight-card${f.is_title_fight ? ' is-title' : ''}" id="fc-${esc(f.id)}" style="animation-delay:${delay}s">
        ${titleBanner}
        <div class="fight-body">
          <div class="fight-meta">
            <span class="weight-pill">${esc(f.weight_class || '')}</span>
            <span class="rounds-pill">${rounds} Rds</span>
            ${fightTime ? `<span class="fight-time">${esc(fightTime)}</span>` : ''}
          </div>
          <div class="fighters-row">
            <div class="fighter">
              ${f1Img
                ? `<img class="f-headshot" src="${f1Img}" alt="${esc(f1.name)}" onerror="this.outerHTML='<div class=\\'f-headshot placeholder\\'>${f1Initial}</div>'">`
                : `<div class="f-headshot placeholder">${f1Initial}</div>`}
              <div class="f-info">
                <div class="fighter-badges">
                  ${f1.country_flag ? `<span class="f-flag">${f1.country_flag}</span>` : ''}
                  ${rankBadge(f1.rank)}
                  ${f1.win_streak && f1.win_streak >= 3 ? `<span class="f-rank" style="background:var(--green-dim);color:var(--green)">🔥${f1.win_streak}W</span>` : ''}
                </div>
                <div class="f-name">${esc(f1.name || '')}</div>
                ${f1.nickname ? `<div class="f-nick">"${esc(f1.nickname)}"</div>` : ''}
                <div class="f-rec">${esc(f1.record || '')}</div>
              </div>
            </div>
            <div class="vs-col"><span class="vs-text">VS</span></div>
            <div class="fighter r">
              ${f2Img
                ? `<img class="f-headshot" src="${f2Img}" alt="${esc(f2.name)}" onerror="this.outerHTML='<div class=\\'f-headshot placeholder\\'>${f2Initial}</div>'">`
                : `<div class="f-headshot placeholder">${f2Initial}</div>`}
              <div class="f-info">
                <div class="fighter-badges">
                  ${rankBadge(f2.rank)}
                  ${f2.country_flag ? `<span class="f-flag">${f2.country_flag}</span>` : ''}
                  ${f2.win_streak && f2.win_streak >= 3 ? `<span class="f-rank" style="background:var(--green-dim);color:var(--green)">🔥${f2.win_streak}W</span>` : ''}
                </div>
                <div class="f-name">${esc(f2.name || '')}</div>
                ${f2.nickname ? `<div class="f-nick">"${esc(f2.nickname)}"</div>` : ''}
                <div class="f-rec">${esc(f2.record || '')}</div>
              </div>
            </div>
          </div>
          ${hasStats ? `
          <div class="fighter-stats-row">
            <div class="fighter-stats">${f1Stats}</div>
            <div class="fighter-stats r">${f2Stats}</div>
          </div>` : ''}
          <div class="odds-section">
            ${oddsHtml}
          </div>
        </div>
        <div class="fight-footer">
          <p class="fight-preview">${esc(f.preview || '')}</p>
          <button class="analyze-btn" id="abtn-${esc(f.id)}"
            onclick="toggleDive('${esc(f.id)}','${escAttr(f1.name)}','${escAttr(f2.name)}')">
            Analyze <span class="analyze-chevron">▾</span>
          </button>
        </div>
        <div class="deep-dive" id="dive-${esc(f.id)}"></div>
      </div>`;
  }

  /* ── Deep dive ───────────────────────────────────────── */
  async function toggleDive(fightId, f1, f2) {
    const panel = document.getElementById(`dive-${fightId}`);
    const btn = document.getElementById(`abtn-${fightId}`);
    if (!panel || !btn) return;

    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      btn.classList.remove('open');
      return;
    }

    btn.classList.add('open');
    panel.classList.add('open');

    // Check in-memory cache
    if (diveCache.has(fightId)) {
      panel.innerHTML = `<div class="dive-inner">${diveCache.get(fightId)}</div>`;
      return;
    }

    // Check localStorage cache
    const lsKey = `ufc-dive:${f1}|${f2}`;
    const lsCached = loadLocalCache(lsKey);
    if (lsCached) {
      const html = buildDive(lsCached);
      diveCache.set(fightId, html);
      panel.innerHTML = `<div class="dive-inner">${html}</div>`;
      return;
    }

    panel.innerHTML = `<div class="dive-inner"><div class="analyzing">
      <div class="spinner"></div>
      <div class="analyzing-lbl">Analyzing fight…</div>
    </div></div>`;

    try {
      const res = await fetch(`${API}?mode=fight&f1=${encodeURIComponent(f1)}&f2=${encodeURIComponent(f2)}`, { headers: HEADERS });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const html = buildDive(data);
      diveCache.set(fightId, html);
      saveLocalCache(lsKey, data);
      panel.innerHTML = `<div class="dive-inner">${html}</div>`;
    } catch (err) {
      panel.innerHTML = `<div class="dive-inner"><div class="state-box" style="padding:32px 20px;">
        <div class="state-sub">Analysis failed: ${esc(err.message)}</div>
      </div></div>`;
    }
  }

  function buildDive(data) {
    const f1 = data.fighter1 || {}, f2 = data.fighter2 || {};
    const pred = data.prediction || {}, h2h = data.head_to_head || {};

    const buildProfile = (f) => {
      const stats = f.stats || {};
      const strengths = (f.strengths || []).map(s => `<li>${esc(s)}</li>`).join('');
      const weaknesses = (f.weaknesses || []).map(w => `<li>${esc(w)}</li>`).join('');
      const last5 = (f.last_5_fights || []).map(r => `
        <div class="result-row">
          <span class="res-badge ${r.result || 'NC'}">${r.result || '?'}</span>
          <span class="res-opp">${esc(r.opponent || '')}</span>
          <span class="res-method">${esc(r.method || '')}</span>
          <span class="res-date">${esc(r.date || '')}</span>
        </div>`).join('');
      const news = (f.recent_news || []).map(n => `<li>${esc(n)}</li>`).join('');

      const physicals = [
        f.age ? `Age <strong>${f.age}</strong>` : '',
        f.height ? `Ht <strong>${esc(f.height)}</strong>` : '',
        f.reach ? `Rc <strong>${esc(f.reach)}</strong>` : '',
        f.stance ? `<strong>${esc(f.stance)}</strong>` : '',
      ].filter(Boolean).join(' · ');

      const statBoxes = [];
      if (stats.sig_strikes_per_min != null) statBoxes.push({ val: stats.sig_strikes_per_min, lbl: 'Str/min' });
      if (stats.sig_strike_accuracy) statBoxes.push({ val: stats.sig_strike_accuracy, lbl: 'Str Acc' });
      if (stats.takedown_avg != null) statBoxes.push({ val: stats.takedown_avg, lbl: 'TD/15m' });
      if (stats.takedown_accuracy) statBoxes.push({ val: stats.takedown_accuracy, lbl: 'TD Acc' });
      if (stats.sub_avg != null) statBoxes.push({ val: stats.sub_avg, lbl: 'Sub/15m' });
      if (f.finish_rate) statBoxes.push({ val: f.finish_rate, lbl: 'Finish %' });

      return `<div class="profile-card">
        <div class="profile-header">
          <div class="profile-name-wrap">
            <div class="profile-name">${esc(f.name || '—')}</div>
            <div class="profile-style">${esc(f.style || '')}</div>
          </div>
          ${physicals ? `<div class="profile-physicals">${physicals}</div>` : ''}
        </div>
        <div class="profile-body">
          ${statBoxes.length ? `
            <div class="stats-grid">
              ${statBoxes.map(s => `<div class="stat-box"><div class="stat-val">${esc(String(s.val))}</div><div class="stat-lbl">${esc(s.lbl)}</div></div>`).join('')}
            </div>` : ''}
          ${strengths ? `<div class="mini-hdr">Strengths</div><ul class="trait-list str">${strengths}</ul>` : ''}
          ${weaknesses ? `<div class="mini-hdr">Weaknesses</div><ul class="trait-list wk">${weaknesses}</ul>` : ''}
          ${last5 ? `<div class="mini-hdr">Last 5 Fights</div><div class="results-list">${last5}</div>` : ''}
          ${f.win_streak && f.win_streak >= 2 ? `<div class="streak-badge">🔥 ${f.win_streak} fight win streak</div>` : ''}
          ${news ? `<div class="mini-hdr" style="margin-top:10px">Recent News</div><ul class="news-items">${news}</ul>` : ''}
        </div>
      </div>`;
    };

    const factors = (data.key_factors || []).map((f, i) => `
      <div class="factor">
        <span class="factor-num">${i + 1}</span>
        <span class="factor-text">${esc(f)}</span>
      </div>`).join('');

    const h2hSection = h2h.previous_meetings > 0 ? `
      <div class="dive-hdr">Head to Head</div>
      <div class="h2h-box">${h2h.previous_meetings} previous meeting${h2h.previous_meetings > 1 ? 's' : ''}.
        ${h2h.history ? ' ' + esc(h2h.history) : ''}</div>` : '';

    const confCls = (pred.confidence || 'medium').toLowerCase();

    return `
      <div class="dive-hdr">Fighter Profiles</div>
      <div class="profiles-grid">${buildProfile(f1)}${buildProfile(f2)}</div>
      ${h2hSection}
      ${factors ? `<div class="dive-hdr">Key Factors</div><div class="factors">${factors}</div>` : ''}
      <div class="dive-hdr">Prediction</div>
      <div class="pred-box">
        <div class="pred-header">
          <span class="pred-winner">${esc(pred.winner || '—')}</span>
          <span class="pred-method">by ${esc(pred.method || '—')}${pred.round ? ` R${pred.round}` : ''}</span>
          ${pred.confidence ? `<span class="conf-badge ${confCls}">${esc(pred.confidence)} confidence</span>` : ''}
        </div>
        ${pred.reasoning ? `<p class="pred-reasoning">${esc(pred.reasoning)}</p>` : ''}
      </div>
      ${data.why_watch ? `<div class="dive-hdr">Why Watch</div><div class="why-box"><p>${esc(data.why_watch)}</p></div>` : ''}
    `;
  }

  /* ── Local cache (localStorage, 12h TTL) ─────────────── */
  function saveLocalCache(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
    } catch {}
  }
  function loadLocalCache(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > 12 * 3600 * 1000) {
        localStorage.removeItem(key);
        return null;
      }
      return data;
    } catch { return null; }
  }

  /* ── Helpers ─────────────────────────────────────────── */
  function fmtDate(d) {
    if (!d) return '';
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function fmtDateLong(d) {
    if (!d) return '';
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
  function fmtTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  }
  function lastName(name) {
    if (!name) return '—';
    return name.split(' ').pop();
  }
  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function escAttr(s) {
    return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  init();
</script>

    if (_hdr) _hdr.style.display = 'none';
}
</script>
