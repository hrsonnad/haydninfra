<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haydn's Knowledge Base</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles/tailwind.out.css">
    <link rel="stylesheet" href="shared/admin.css">
    <style>
        body { background: var(--aap-bg, #f8fafc); font-family: system-ui, -apple-system, sans-serif; margin: 0; }
    </style>
</head>
<body>
    <nav style="background:#fff; border-bottom:1px solid #e5e7eb; padding:0 24px; height:56px; display:flex; align-items:center;">
        <div class="site-nav__inner" style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:1200px; margin:0 auto;">
            <span style="font-weight:600; font-size:15px; color:#0f172a;">🗂 Knowledge Base</span>
        </div>
    </nav>

    <main style="max-width:640px; margin:80px auto; padding:0 24px; text-align:center;">
        <h1 style="font-size:2rem; font-weight:700; color:#0f172a; margin-bottom:12px;">Personal Knowledge Base</h1>
        <p style="color:#64748b; font-size:1.05rem; margin-bottom:40px;">Your private store for documents, notes, and project context.</p>

        <div id="cta-logged-out" style="display:none;">
            <p style="color:#94a3b8; font-size:14px; margin-bottom:16px;">Sign in to access your knowledge base.</p>
            <button onclick="document.getElementById('authLoginBtn') && document.getElementById('authLoginBtn').click()"
                style="background:#2563eb; color:#fff; padding:12px 28px; border-radius:8px; border:none; font-weight:500; font-size:15px; cursor:pointer;">
                Sign In
            </button>
        </div>

        <div id="cta-logged-in" style="display:none;">
            <a href="admin/index.html" style="display:inline-block; background:#2563eb; color:#fff; padding:12px 28px; border-radius:8px; text-decoration:none; font-weight:500; font-size:15px;">Go to Admin →</a>
        </div>
    </main>

    <!-- Scripts at end of body so DOM is always ready -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="shared/supabase.js"></script>
    <script src="shared/auth.js"></script>
    <script>
        (function() {
            function updateCTA(session) {
                document.getElementById('cta-logged-in').style.display = session ? 'block' : 'none';
                document.getElementById('cta-logged-out').style.display = session ? 'none' : 'block';
            }
            function init() {
                if (!window.adminSupabase) { updateCTA(null); return; }
                adminSupabase.auth.getSession().then(function(r) {
                    updateCTA(r.data && r.data.session);
                }).catch(function() { updateCTA(null); });
                adminSupabase.auth.onAuthStateChange(function(_, session) { updateCTA(session); });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
