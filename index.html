<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haydn's Knowledge Base</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles/tailwind.out.css">
    <link rel="stylesheet" href="shared/admin.css">
    <style>
        body { background: var(--aap-bg, #f8fafc); font-family: system-ui, -apple-system, sans-serif; margin: 0; }

        .page-card {
            display: flex; align-items: center; gap: 14px;
            background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
            padding: 16px 20px; text-decoration: none; color: #0f172a;
            transition: box-shadow 0.15s, border-color 0.15s;
        }
        .page-card:hover { border-color: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .page-card-icon { font-size: 22px; flex-shrink: 0; }
        .page-card-title { font-weight: 600; font-size: 14px; }
        .page-card-desc { font-size: 12px; color: #64748b; margin-top: 2px; }
        .page-card-arrow { margin-left: auto; color: #94a3b8; font-size: 16px; }

        .section-label {
            font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: #94a3b8; margin-bottom: 12px;
        }
        .pages-skeleton {
            height: 60px; background: #f1f5f9; border-radius: 10px;
            animation: shimmer 1.4s infinite;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body>
    <nav style="background:#fff; border-bottom:1px solid #e5e7eb; padding:0 24px; height:56px; display:flex; align-items:center;">
        <div class="site-nav__inner" style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:640px; margin:0 auto;">
            <span style="font-weight:600; font-size:15px; color:#0f172a;">🗂 Knowledge Base</span>
        </div>
    </nav>

    <main style="max-width:640px; margin:60px auto; padding:0 24px;">
        <h1 style="font-size:1.6rem; font-weight:700; color:#0f172a; margin-bottom:6px;">Haydn Sonnad</h1>
        <p style="color:#64748b; font-size:14px; margin-bottom:40px;">Personal knowledge base &amp; public pages.</p>

        <!-- Public Pages — always visible, loaded from DB -->
        <div style="margin-bottom:36px;">
            <div class="section-label">Public Pages</div>
            <div id="public-pages" style="display:flex; flex-direction:column; gap:8px;">
                <div class="pages-skeleton"></div>
            </div>
        </div>

        <!-- Admin — shown when logged in -->
        <div id="admin-section" style="display:none;">
            <div class="section-label">Admin</div>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <a href="admin/index.html" class="page-card">
                    <span class="page-card-icon">🗂</span>
                    <div>
                        <div class="page-card-title">Admin Dashboard</div>
                        <div class="page-card-desc">Documents, projects, notes, tags</div>
                    </div>
                    <span class="page-card-arrow">→</span>
                </a>
            </div>
        </div>

        <!-- Sign in prompt — shown when logged out -->
        <div id="signin-section" style="display:none;">
            <div class="section-label">Admin Access</div>
            <p style="color:#94a3b8; font-size:13px; margin-bottom:12px;">Sign in to access the admin dashboard.</p>
            <button onclick="document.getElementById('authLoginBtn') && document.getElementById('authLoginBtn').click()"
                style="background:#2563eb; color:#fff; padding:10px 24px; border-radius:8px; border:none; font-weight:500; font-size:14px; cursor:pointer;">
                Sign In
            </button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="shared/supabase.js"></script>
    <script src="shared/auth.js"></script>
    <script>
        // Load public pages from DB (anon-readable via RLS)
        async function loadPublicPages() {
            const el = document.getElementById('public-pages');
            try {
                const { data, error } = await adminSupabase
                    .from('public_pages')
                    .select('title, description, icon, path')
                    .eq('is_archived', false)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!data || data.length === 0) {
                    el.innerHTML = '<p style="color:#94a3b8;font-size:13px;">No public pages yet.</p>';
                    return;
                }

                el.innerHTML = data.map(p => `
                    <a href="${p.path}" class="page-card">
                        <span class="page-card-icon">${p.icon || '📄'}</span>
                        <div>
                            <div class="page-card-title">${p.title}</div>
                            ${p.description ? `<div class="page-card-desc">${p.description}</div>` : ''}
                        </div>
                        <span class="page-card-arrow">→</span>
                    </a>
                `).join('');
            } catch (e) {
                // Fallback: show nothing, don't break the page
                el.innerHTML = '<p style="color:#94a3b8;font-size:13px;">Could not load pages.</p>';
            }
        }

        (function() {
            function updateCTA(session) {
                document.getElementById('admin-section').style.display = session ? 'block' : 'none';
                document.getElementById('signin-section').style.display = session ? 'none' : 'block';
            }
            function init() {
                if (!window.adminSupabase) { updateCTA(null); return; }
                loadPublicPages();
                adminSupabase.auth.getSession().then(function(r) {
                    updateCTA(r.data && r.data.session);
                }).catch(function() { updateCTA(null); });
                adminSupabase.auth.onAuthStateChange(function(_, session) { updateCTA(session); });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
