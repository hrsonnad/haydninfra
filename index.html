<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haydns.ai</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/admin.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font: 'Outfit', system-ui, -apple-system, sans-serif;
            --text: #1a1a1a;
            --text-2: #6b6b6b;
            --text-3: #ababab;
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --hover: rgba(0,0,0,0.04);
            --active: rgba(0,0,0,0.07);
            --line: #f0f0f0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg);
            padding: 0;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        .sidebar-brand {
            padding: 20px 20px 24px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .tree {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .tree-item {}

        .tree-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            padding: 6px 12px;
            background: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 400;
            color: var(--text-2);
            text-align: left;
            transition: background 120ms ease, color 120ms ease;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-btn:hover {
            background: var(--hover);
            color: var(--text);
        }

        .tree-btn--active {
            background: var(--active);
            color: var(--text);
            font-weight: 500;
        }

        .tree-chevron {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text-3);
            transition: transform 150ms ease;
            font-size: 10px;
        }

        .tree-chevron--open {
            transform: rotate(90deg);
        }

        .tree-lock {
            margin-left: auto;
            flex-shrink: 0;
            opacity: 0.35;
        }

        .tree-children {
            overflow: hidden;
            max-height: 0;
            transition: max-height 200ms ease;
        }

        .tree-children--open {
            max-height: 300px;
        }

        .tree-children .tree-btn {
            padding-left: 40px;
            font-size: 13px;
            color: var(--text-3);
        }

        .tree-children .tree-btn:hover {
            color: var(--text-2);
        }

        .tree-children .tree-btn--active {
            color: var(--text);
        }

        .sidebar-footer {
            padding: 12px;
            margin-top: auto;
        }

        /* ── Content ── */
        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            position: absolute;
            inset: 0;
        }

        .page--active {
            display: block;
        }

        /* Welcome canvas fills the content area */
        #welcome-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Particle overlay — content area only */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* ── Placeholder pages ── */
        .page-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-3);
        }

        .page-inner-label {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .page-inner-sub {
            font-size: 12px;
            margin-top: 6px;
            color: var(--text-3);
            opacity: 0.6;
        }

        /* ── Auth overrides ── */
        .sidebar-footer .site-nav__inner {
            display: flex;
        }

        .sidebar-footer .auth-widget {
            position: relative !important;
            top: auto !important;
            right: auto !important;
            margin-left: 0 !important;
        }

        .sidebar-footer .auth-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--bg);
            color: var(--text-2);
            cursor: pointer;
            transition: all 120ms ease;
        }

        .sidebar-footer .auth-btn:hover {
            background: var(--hover);
            border-color: #ddd;
            color: var(--text);
        }

        .sidebar-footer .auth-avatar--initials {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 600;
            background: var(--text);
            color: var(--bg);
        }

        .sidebar-footer .auth-avatar--initials:hover {
            background: #333;
            box-shadow: none;
        }

        .sidebar-footer .auth-dropdown {
            border-radius: 10px;
            border: 1px solid var(--line);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            bottom: calc(100% + 6px);
            top: auto;
            font-family: var(--font);
        }

        .sidebar-footer .auth-dropdown__user {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        .sidebar-footer .auth-dropdown__item {
            font-family: var(--font);
            font-size: 13px;
            border-radius: 6px;
        }

        .sidebar-footer .auth-dropdown__item:hover {
            background: var(--hover);
            color: var(--text);
        }

        .sidebar-footer .auth-dropdown__signout:hover {
            background: rgba(220,38,38,0.06);
            color: #dc2626;
        }

        /* Auth modal overrides */
        .auth-modal__card {
            border-radius: 14px !important;
            border: 1px solid var(--line) !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06) !important;
            font-family: var(--font) !important;
        }

        .auth-modal__title {
            font-family: var(--font) !important;
            font-size: 18px !important;
            font-weight: 600 !important;
            color: var(--text) !important;
            letter-spacing: -0.02em !important;
        }

        .auth-modal__subtitle {
            font-family: var(--font) !important;
            font-size: 13px !important;
            color: var(--text-2) !important;
        }

        .auth-modal__submit {
            border-radius: 10px !important;
            font-family: var(--font) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            background: var(--text) !important;
            padding: 12px !important;
        }

        .auth-modal__submit:hover {
            background: #333 !important;
        }

        .auth-modal__field label {
            font-family: var(--font) !important;
            font-size: 13px !important;
            font-weight: 500 !important;
            color: var(--text-2) !important;
            text-transform: none !important;
            letter-spacing: 0 !important;
        }

        .auth-modal__field input {
            border-radius: 10px !important;
            border: 1px solid #ddd !important;
            font-family: var(--font) !important;
            font-size: 14px !important;
            background: var(--bg) !important;
        }

        .auth-modal__field input:focus {
            box-shadow: 0 0 0 3px rgba(0,0,0,0.06) !important;
            border-color: #999 !important;
        }

        .auth-modal__google-btn {
            border-radius: 10px !important;
            font-family: var(--font) !important;
            font-size: 13px !important;
            font-weight: 500 !important;
        }

        .auth-modal__backdrop {
            background: rgba(0,0,0,0.25) !important;
            backdrop-filter: blur(4px) !important;
            -webkit-backdrop-filter: blur(4px) !important;
        }

        .auth-modal__divider {
            font-family: var(--font) !important;
        }

        /* Scrollbar */
        .tree::-webkit-scrollbar { width: 4px; }
        .tree::-webkit-scrollbar-track { background: transparent; }
        .tree::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-brand">haydns.ai</div>
            <nav class="tree" id="tree"></nav>
            <div class="sidebar-footer">
                <div class="site-nav__inner"></div>
            </div>
        </aside>

        <main class="content">
            <div class="page page--active" id="page-welcome">
                <canvas id="welcome-canvas"></canvas>
                <canvas id="particle-canvas"></canvas>
            </div>

            <div class="page" id="page-resume">
                <div class="page-inner">
                    <div class="page-inner-label">Resume</div>
                    <div class="page-inner-sub">coming soon</div>
                </div>
            </div>

            <div class="page" id="page-other">
                <div class="page-inner">
                    <div class="page-inner-label">Other</div>
                    <div class="page-inner-sub">coming soon</div>
                </div>
            </div>

            <div class="page" id="page-prtfolio">
                <div class="page-inner">
                    <div class="page-inner-label">Prtfolio.ai</div>
                    <div class="page-inner-sub">coming soon</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="shared/supabase.js"></script>
    <script src="shared/auth.js"></script>
    <script>
    (function() {
        'use strict';

        // ─── Tree data ───
        var isAuthed = false;
        var activePage = 'welcome';

        var TREE = [
            { id: 'welcome', label: 'Welcome', type: 'page' },
            { id: 'about', label: 'About.me', type: 'branch', open: false, children: [
                { id: 'resume', label: 'Resume', type: 'page' },
                { id: 'other', label: 'Other', type: 'page' }
            ]},
            { id: 'projects', label: 'Projects', type: 'branch', open: false, children: [
                { id: 'prtfolio', label: 'Prtfolio.ai', type: 'page' }
            ]},
            { id: 'public-pages', label: 'Public Pages', type: 'branch', open: false, children: [] },
            { id: 'private-pages', label: 'Private Pages', type: 'branch', open: false, locked: true, children: [
                { id: 'admin-dash', label: 'Dashboard', type: 'link', href: 'admin/index.html' },
                { id: 'admin-resume', label: 'Resume Hub', type: 'link', href: 'admin/resume.html' },
                { id: 'admin-pages', label: 'Page Manager', type: 'link', href: 'admin/public-pages.html' }
            ]}
        ];

        function renderTree() {
            var el = document.getElementById('tree');
            el.innerHTML = '';
            TREE.forEach(function(item) { el.appendChild(makeNode(item)); });
        }

        function makeNode(item) {
            var wrap = document.createElement('div');
            wrap.className = 'tree-item';

            var btn = document.createElement('button');
            btn.className = 'tree-btn';
            btn.dataset.id = item.id;
            if (item.id === activePage) btn.classList.add('tree-btn--active');

            if (item.type === 'branch') {
                var chev = document.createElement('span');
                chev.className = 'tree-chevron' + (item.open ? ' tree-chevron--open' : '');
                chev.innerHTML = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M6 3l5 5-5 5z"/></svg>';
                btn.appendChild(chev);
            }

            var span = document.createElement('span');
            span.textContent = item.label;
            btn.appendChild(span);

            if (item.locked && !isAuthed) {
                var lock = document.createElement('span');
                lock.className = 'tree-lock';
                lock.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>';
                btn.appendChild(lock);
            }

            wrap.appendChild(btn);

            if (item.type === 'branch' && item.children) {
                var kids = document.createElement('div');
                kids.className = 'tree-children' + (item.open ? ' tree-children--open' : '');
                item.children.forEach(function(child) { kids.appendChild(makeNode(child)); });
                wrap.appendChild(kids);

                btn.addEventListener('click', function() {
                    if (item.locked && !isAuthed) return;
                    item.open = !item.open;
                    kids.classList.toggle('tree-children--open', item.open);
                    var c = btn.querySelector('.tree-chevron');
                    if (c) c.classList.toggle('tree-chevron--open', item.open);
                });
            } else if (item.type === 'page') {
                btn.addEventListener('click', function() { showPage(item.id); });
            } else if (item.type === 'link') {
                btn.addEventListener('click', function() { window.open(item.href, '_blank'); });
            }

            return wrap;
        }

        function showPage(id) {
            activePage = id;
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < pages.length; i++) pages[i].classList.remove('page--active');
            var p = document.getElementById('page-' + id);
            if (p) p.classList.add('page--active');
            var btns = document.querySelectorAll('.tree-btn');
            for (var j = 0; j < btns.length; j++) {
                btns[j].classList.toggle('tree-btn--active', btns[j].dataset.id === id);
            }
            // Resize welcome canvas when switching pages
            if (id === 'welcome') resizeWelcome();
        }

        // ─── Floating icons (welcome page screensaver) ───
        var wCanvas = document.getElementById('welcome-canvas');
        var wCtx = wCanvas.getContext('2d');
        var floaters = [];

        // Icon drawing functions — each draws centered at (0,0) at given scale
        var iconDrawers = [
            // 0: Car (Tesla-ish)
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(-s*.44, s*.08);
                ctx.lineTo(-s*.44, -s*.02);
                ctx.lineTo(-s*.32, -s*.02);
                ctx.lineTo(-s*.18, -s*.28);
                ctx.lineTo(s*.14, -s*.28);
                ctx.lineTo(s*.28, -s*.02);
                ctx.lineTo(s*.46, -s*.02);
                ctx.lineTo(s*.46, s*.08);
                ctx.lineTo(s*.38, s*.08);
                ctx.stroke();
                ctx.beginPath(); ctx.arc(-s*.22, s*.12, s*.07, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(s*.26, s*.12, s*.07, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s*.44, s*.08); ctx.lineTo(-s*.32, s*.08); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s*.12, s*.08); ctx.lineTo(s*.16, s*.08); ctx.stroke();
            },
            // 1: Robot
            function(ctx, s) {
                ctx.strokeRect(-s*.18, -s*.26, s*.36, s*.28);
                ctx.beginPath(); ctx.arc(-s*.07, -s*.14, s*.03, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(s*.07, -s*.14, s*.03, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -s*.26); ctx.lineTo(0, -s*.36); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, -s*.38, s*.025, 0, Math.PI*2); ctx.stroke();
                ctx.strokeRect(-s*.22, s*.06, s*.44, s*.28);
                ctx.beginPath();
                ctx.moveTo(-s*.1, s*.34); ctx.lineTo(-s*.12, s*.48);
                ctx.moveTo(s*.1, s*.34); ctx.lineTo(s*.12, s*.48);
                ctx.stroke();
            },
            // 2: Laptop
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(-s*.28, -s*.24);
                ctx.lineTo(s*.28, -s*.24);
                ctx.lineTo(s*.24, s*.06);
                ctx.lineTo(-s*.24, s*.06);
                ctx.closePath();
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-s*.38, s*.1);
                ctx.lineTo(s*.38, s*.1);
                ctx.lineTo(s*.42, s*.2);
                ctx.lineTo(-s*.42, s*.2);
                ctx.closePath();
                ctx.stroke();
            },
            // 3: Horse
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(-s*.3, -s*.1);
                ctx.quadraticCurveTo(-s*.1, -s*.28, s*.1, -s*.18);
                ctx.lineTo(s*.26, -s*.36);
                ctx.lineTo(s*.36, -s*.4);
                ctx.lineTo(s*.38, -s*.32);
                ctx.lineTo(s*.28, -s*.24);
                ctx.quadraticCurveTo(s*.18, -s*.08, s*.14, s*.04);
                ctx.lineTo(s*.2, s*.32);
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(s*.06, s*.02); ctx.lineTo(s*.02, s*.32); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s*.12, -s*.04); ctx.lineTo(-s*.2, s*.32); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s*.22, -s*.04); ctx.lineTo(-s*.3, s*.32); ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-s*.3, -s*.1);
                ctx.quadraticCurveTo(-s*.46, -s*.06, -s*.42, s*.06);
                ctx.stroke();
            },
            // 4: Palm tree
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(0, s*.44);
                ctx.quadraticCurveTo(s*.04, s*.1, -s*.02, -s*.16);
                ctx.stroke();
                // Fronds
                var fronds = [[-s*.38,-s*.28],[-s*.32,-s*.44],[s*.08,-s*.46],[s*.34,-s*.36],[s*.38,-s*.18]];
                for (var i = 0; i < fronds.length; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-s*.02, -s*.16);
                    ctx.quadraticCurveTo(fronds[i][0]*0.5, fronds[i][1]*0.8, fronds[i][0], fronds[i][1]);
                    ctx.stroke();
                }
            },
            // 5: Snowboard
            function(ctx, s) {
                ctx.beginPath();
                ctx.ellipse(0, 0, s*.42, s*.1, -Math.PI/6, 0, Math.PI*2);
                ctx.stroke();
                // Bindings
                ctx.save();
                ctx.rotate(-Math.PI/6);
                ctx.strokeRect(-s*.12, -s*.14, s*.08, s*.08);
                ctx.strokeRect(s*.06, -s*.14, s*.08, s*.08);
                ctx.restore();
            },
            // 6: Cowboy hat
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(-s*.44, s*.06);
                ctx.quadraticCurveTo(-s*.3, s*.18, -s*.18, s*.06);
                ctx.quadraticCurveTo(-s*.12, -s*.24, 0, -s*.28);
                ctx.quadraticCurveTo(s*.12, -s*.24, s*.18, s*.06);
                ctx.quadraticCurveTo(s*.3, s*.18, s*.44, s*.06);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-s*.44, s*.06);
                ctx.quadraticCurveTo(0, s*.28, s*.44, s*.06);
                ctx.stroke();
            },
            // 7: Coffee cup
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(-s*.18, -s*.14);
                ctx.lineTo(-s*.14, s*.24);
                ctx.lineTo(s*.14, s*.24);
                ctx.lineTo(s*.18, -s*.14);
                ctx.closePath();
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*.18, -s*.04);
                ctx.quadraticCurveTo(s*.34, -s*.02, s*.34, s*.1);
                ctx.quadraticCurveTo(s*.34, s*.2, s*.18, s*.16);
                ctx.stroke();
                // Steam
                ctx.beginPath();
                ctx.moveTo(-s*.06, -s*.18);
                ctx.quadraticCurveTo(-s*.1, -s*.3, -s*.04, -s*.38);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*.06, -s*.2);
                ctx.quadraticCurveTo(s*.1, -s*.32, s*.04, -s*.42);
                ctx.stroke();
            },
            // 8: Guitar
            function(ctx, s) {
                // Body — figure-8 with larger bottom bout
                ctx.beginPath();
                ctx.moveTo(0, s*.04);
                ctx.bezierCurveTo(-s*.22, s*.02, -s*.24, s*.3, 0, s*.32);
                ctx.bezierCurveTo(s*.24, s*.3, s*.22, s*.02, 0, s*.04);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, s*.04);
                ctx.bezierCurveTo(-s*.16, s*.02, -s*.18, -s*.16, 0, -s*.18);
                ctx.bezierCurveTo(s*.18, -s*.16, s*.16, s*.02, 0, s*.04);
                ctx.stroke();
                // Neck
                ctx.beginPath();
                ctx.moveTo(-s*.03, -s*.18);
                ctx.lineTo(-s*.03, -s*.44);
                ctx.lineTo(s*.03, -s*.44);
                ctx.lineTo(s*.03, -s*.18);
                ctx.stroke();
                // Sound hole
                ctx.beginPath();
                ctx.arc(0, s*.16, s*.05, 0, Math.PI*2);
                ctx.stroke();
            },
            // 9: Mountain
            function(ctx, s) {
                ctx.beginPath();
                ctx.moveTo(-s*.44, s*.3);
                ctx.lineTo(-s*.08, -s*.32);
                ctx.lineTo(s*.06, -s*.08);
                ctx.lineTo(s*.18, -s*.24);
                ctx.lineTo(s*.44, s*.3);
                ctx.closePath();
                ctx.stroke();
                // Snow cap
                ctx.beginPath();
                ctx.moveTo(-s*.18, -s*.14);
                ctx.lineTo(-s*.08, -s*.32);
                ctx.lineTo(s*.02, -s*.14);
                ctx.stroke();
            }
        ];

        function initFloaters() {
            floaters = [];
            var w = wCanvas.width, h = wCanvas.height;
            var cols = 4, rows = 3;
            var cellW = w / cols, cellH = h / rows;
            for (var i = 0; i < iconDrawers.length; i++) {
                var col = i % cols;
                var row = Math.floor(i / cols) % rows;
                var sz = 38 + Math.random() * 24;
                var pad = sz * 0.6;
                floaters.push({
                    x: cellW * col + pad + Math.random() * (cellW - pad * 2),
                    y: cellH * row + pad + Math.random() * (cellH - pad * 2),
                    vx: (0.35 + Math.random() * 0.55) * (Math.random() < 0.5 ? 1 : -1),
                    vy: (0.35 + Math.random() * 0.55) * (Math.random() < 0.5 ? 1 : -1),
                    rotation: Math.random() * Math.PI * 2,
                    spin: (Math.random() - 0.5) * 0.005,
                    size: sz,
                    opacity: 0.12 + Math.random() * 0.16,
                    draw: iconDrawers[i]
                });
            }
        }

        function updateFloaters() {
            var w = wCanvas.width, h = wCanvas.height;
            for (var i = 0; i < floaters.length; i++) {
                var f = floaters[i];
                f.x += f.vx;
                f.y += f.vy;
                f.rotation += f.spin;
                var margin = f.size * 0.5;
                if (f.x < margin) { f.x = margin; f.vx = Math.abs(f.vx); }
                if (f.x > w - margin) { f.x = w - margin; f.vx = -Math.abs(f.vx); }
                if (f.y < margin) { f.y = margin; f.vy = Math.abs(f.vy); }
                if (f.y > h - margin) { f.y = h - margin; f.vy = -Math.abs(f.vy); }
            }
        }

        function drawFloaters() {
            wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
            for (var i = 0; i < floaters.length; i++) {
                var f = floaters[i];
                wCtx.save();
                wCtx.translate(f.x, f.y);
                wCtx.rotate(f.rotation);
                wCtx.globalAlpha = f.opacity;
                wCtx.strokeStyle = '#1a1a1a';
                wCtx.lineWidth = 1.5;
                wCtx.lineCap = 'round';
                wCtx.lineJoin = 'round';
                f.draw(wCtx, f.size);
                wCtx.restore();
            }
        }

        function resizeWelcome() {
            var cont = document.querySelector('.content');
            if (!cont) return;
            var r = cont.getBoundingClientRect();
            wCanvas.width = r.width;
            wCanvas.height = r.height;
            pCanvas.width = r.width;
            pCanvas.height = r.height;
            if (floaters.length === 0) initFloaters();
        }

        // ─── Cursor particles (content area only) ───
        var pCanvas = document.getElementById('particle-canvas');
        var pCtx = pCanvas.getContext('2d');
        var particles = [];
        var contentRect = { left: 0, top: 0, right: 0, bottom: 0 };

        function updateContentRect() {
            var el = document.querySelector('.content');
            if (el) {
                var r = el.getBoundingClientRect();
                contentRect = { left: r.left, top: r.top, right: r.right, bottom: r.bottom };
            }
        }

        document.addEventListener('mousemove', function(e) {
            // Only spawn particles inside the content area and on the welcome page
            if (activePage !== 'welcome') return;
            if (e.clientX < contentRect.left || e.clientX > contentRect.right) return;
            if (e.clientY < contentRect.top || e.clientY > contentRect.bottom) return;

            var localX = e.clientX - contentRect.left;
            var localY = e.clientY - contentRect.top;

            for (var i = 0; i < 2; i++) {
                if (particles.length < 40) {
                    particles.push({
                        x: localX,
                        y: localY,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 2.5 - 0.8,
                        life: 1,
                        decay: 0.025 + Math.random() * 0.015,
                        size: 1.5 + Math.random() * 2
                    });
                }
            }
        });

        function updateParticles() {
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                pCtx.globalAlpha = p.life * 0.4;
                pCtx.fillStyle = '#1a1a1a';
                pCtx.beginPath();
                pCtx.arc(Math.round(p.x), Math.round(p.y), p.size, 0, Math.PI * 2);
                pCtx.fill();
            }
            pCtx.globalAlpha = 1;
        }

        // ─── Main loop ───
        function loop() {
            if (activePage === 'welcome') {
                updateFloaters();
                drawFloaters();
            }
            updateParticles();
            drawParticles();
            requestAnimationFrame(loop);
        }

        // ─── Auth integration ───
        function setAuth(session) {
            isAuthed = !!(session && session.user);
            renderTree();
        }

        async function loadPublicPages() {
            if (!window.adminSupabase) return;
            var node = null;
            for (var i = 0; i < TREE.length; i++) {
                if (TREE[i].id === 'public-pages') { node = TREE[i]; break; }
            }
            if (!node) return;
            try {
                var res = await adminSupabase
                    .from('public_pages')
                    .select('title, path')
                    .eq('is_archived', false)
                    .order('created_at', { ascending: true });
                if (res.error) throw res.error;
                if (res.data && res.data.length > 0) {
                    node.children = res.data.map(function(p) {
                        return { id: 'pub-' + p.title.toLowerCase().replace(/[^a-z0-9]/g, '-'), label: p.title, type: 'link', href: p.path };
                    });
                }
            } catch (e) { /* silent */ }
            renderTree();
        }

        // ─── Init ───
        function init() {
            renderTree();
            resizeWelcome();
            updateContentRect();

            if (window.adminSupabase) {
                adminSupabase.auth.getSession().then(function(r) {
                    setAuth(r.data && r.data.session);
                }).catch(function() { setAuth(null); });
                adminSupabase.auth.onAuthStateChange(function(_, s) { setAuth(s); });
                loadPublicPages();
            }

            loop();
        }

        window.addEventListener('resize', function() {
            resizeWelcome();
            updateContentRect();
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
