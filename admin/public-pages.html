<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Pages — Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin.css">
</head>
<body style="margin:0; background:#fff; font-family:'Outfit',system-ui,sans-serif;">

    <div class="admin-shell" id="admin-shell" style="display:none;">

        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-brand">
                admin
                <a href="../index.html" style="margin-left:auto;">← site</a>
            </div>

            <nav class="admin-tree">
                <a href="index.html" class="admin-tree-btn">Dashboard</a>
                <div style="height:1px; background:var(--line); margin:8px 4px;"></div>
                <a href="documents.html" class="admin-tree-btn admin-tree-btn--muted">Documents</a>
                <a href="projects.html" class="admin-tree-btn admin-tree-btn--muted">Projects</a>
                <a href="notes.html" class="admin-tree-btn admin-tree-btn--muted">Notes</a>
                <a href="tags.html" class="admin-tree-btn admin-tree-btn--muted">Tags</a>
                <div style="height:1px; background:var(--line); margin:8px 4px;"></div>
                <a href="public-pages.html" class="admin-tree-btn admin-tree-btn--active">Public Pages</a>
            </nav>

            <div class="admin-sidebar-footer">
                <div class="site-nav__inner"></div>
            </div>
        </aside>

        <!-- Content -->
        <div class="admin-content">
            <div class="admin-topbar">
                <span class="admin-topbar-title">Public Pages</span>
                <div class="admin-topbar-actions">
                    <button class="btn-primary" onclick="openModal()">+ Add Page</button>
                </div>
            </div>

            <div class="admin-main" id="main-content">
                <div class="admin-toolbar">
                    <div class="admin-filter-tabs">
                        <button class="admin-filter-tab active" onclick="setFilter('active', this)">Active</button>
                        <button class="admin-filter-tab" onclick="setFilter('archived', this)">Archived</button>
                        <button class="admin-filter-tab" onclick="setFilter('all', this)">All</button>
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table" id="pages-table">
                        <thead>
                            <tr>
                                <th>Page</th>
                                <th>Path</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th style="text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pages-tbody">
                            <tr>
                                <td><div class="skel" style="width:120px"></div></td>
                                <td><div class="skel" style="width:160px"></div></td>
                                <td><div class="skel" style="width:200px"></div></td>
                                <td><div class="skel" style="width:60px"></div></td>
                                <td></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Add Page Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Add Public Page</h2>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Icon</label>
                    <input class="form-input" id="f-icon" type="text" value="📄" maxlength="4">
                </div>
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input class="form-input" id="f-title" type="text" placeholder="Page title">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Path <span style="color:var(--text-3);text-transform:none;letter-spacing:0;font-weight:400;">(relative to site root)</span></label>
                <input class="form-input" id="f-path" type="text" placeholder="public/my-page.html">
            </div>
            <div class="form-group">
                <label class="form-label">Description <span style="color:var(--text-3);text-transform:none;letter-spacing:0;font-weight:400;">(optional)</span></label>
                <input class="form-input" id="f-desc" type="text" placeholder="Short description">
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="addPage()">Add Page</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../shared/supabase.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        let allPages = [];
        let currentFilter = 'active';

        requireAuth(async function() {
            document.getElementById('admin-shell').style.display = 'flex';
            await fetchPages();
        });

        async function fetchPages() {
            const { data, error } = await adminSupabase
                .from('public_pages')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { toast('Failed to load pages', 'error'); return; }
            allPages = data || [];
            renderTable();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.admin-filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('pages-tbody');
            let pages = allPages;
            if (currentFilter === 'active') pages = allPages.filter(p => !p.is_archived);
            if (currentFilter === 'archived') pages = allPages.filter(p => p.is_archived);

            if (pages.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="admin-empty">No pages found.</div></td></tr>`;
                return;
            }

            tbody.innerHTML = pages.map(p => `
                <tr>
                    <td style="color:var(--text); font-weight:500;">${p.icon || ''} ${p.title}</td>
                    <td><span class="mono">${p.path}</span></td>
                    <td>${p.description || '—'}</td>
                    <td>
                        <span class="status-dot ${p.is_archived ? '' : 'status-dot--active'}">
                            ${p.is_archived ? 'archived' : 'active'}
                        </span>
                    </td>
                    <td>
                        <div class="actions">
                            <a href="/${p.path}" target="_blank" class="action-btn">View ↗</a>
                            ${p.is_archived
                                ? `<button class="action-btn success" onclick="setArchived('${p.id}', false)">Restore</button>`
                                : `<button class="action-btn" onclick="setArchived('${p.id}', true)">Archive</button>`
                            }
                            <button class="action-btn danger" onclick="deletePage('${p.id}', '${p.title.replace(/'/g, "\\'")}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function setArchived(id, archived) {
            const { error } = await adminSupabase
                .from('public_pages')
                .update({ is_archived: archived, updated_at: new Date().toISOString() })
                .eq('id', id);

            if (error) { toast('Update failed', 'error'); return; }
            const page = allPages.find(p => p.id === id);
            if (page) page.is_archived = archived;
            renderTable();
            toast(archived ? 'Page archived' : 'Page restored', 'success');
        }

        async function deletePage(id, title) {
            if (!confirm(`Permanently remove "${title}" from the registry?\n\nThe HTML file on disk is not deleted — only the navigation entry is removed.`)) return;

            const { error } = await adminSupabase
                .from('public_pages')
                .delete()
                .eq('id', id);

            if (error) { toast('Delete failed', 'error'); return; }
            allPages = allPages.filter(p => p.id !== id);
            renderTable();
            toast('Page removed', 'success');
        }

        async function addPage() {
            const title = document.getElementById('f-title').value.trim();
            const path = document.getElementById('f-path').value.trim();
            const icon = document.getElementById('f-icon').value.trim() || '📄';
            const description = document.getElementById('f-desc').value.trim() || null;

            if (!title || !path) { toast('Title and path are required', 'error'); return; }

            const { data, error } = await adminSupabase
                .from('public_pages')
                .insert({ title, path, icon, description })
                .select()
                .single();

            if (error) { toast('Failed to add page', 'error'); return; }
            allPages.unshift(data);
            currentFilter = 'active';
            document.querySelectorAll('.admin-filter-tab').forEach((b, i) => b.classList.toggle('active', i === 0));
            renderTable();
            closeModal();
            toast('Page added', 'success');
        }

        function openModal() {
            document.getElementById('f-title').value = '';
            document.getElementById('f-path').value = '';
            document.getElementById('f-icon').value = '📄';
            document.getElementById('f-desc').value = '';
            document.getElementById('modal').classList.add('open');
            setTimeout(() => document.getElementById('f-title').focus(), 50);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        let toastTimer;
        function toast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show' + (type ? ' ' + type : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = ''; }, 2800);
        }
    </script>
    <script>
        if (window.self !== window.top) {
            var _sidebar = document.querySelector('.admin-sidebar');
            if (_sidebar) _sidebar.style.display = 'none';
        }
    </script>
</body>
</html>
